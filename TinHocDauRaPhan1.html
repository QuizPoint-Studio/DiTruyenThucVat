        const getOrCreateDeviceToken = () => {
            let token = localStorage.getItem("qp_device_token_itbasic");
            if (!token) {
                token = "m_it_" + Math.random().toString(36).substring(2, 15) + Date.now().toString(36);
                localStorage.setItem("qp_device_token_itbasic", token);
            }
            return token;
        };

        const QuizApp = () => {
          const [user, setUser] = useState(null);
          const [loading, setLoading] = useState(true);
          const [emailInput, setEmailInput] = useState("");
          const [passwordInput, setPasswordInput] = useState("");
          const [authError, setAuthError] = useState("");
          const [isKicked, setIsKicked] = useState(false);
          const [isDarkMode, setIsDarkMode] = useState(false);

          const [currentPart, setCurrentPart] = useState(null);
          const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
          const [score, setScore] = useState(0);
          const [wrongScore, setWrongScore] = useState(0); 
          const [showResult, setShowResult] = useState(false);
          
          const [selectedOptions, setSelectedOptions] = useState([]); 
          const [isSubmitted, setIsSubmitted] = useState(false); 
          
          const [questions, setQuestions] = useState([]);
          const [shuffledOptions, setShuffledOptions] = useState([]);
          const [isConfirming, setIsConfirming] = useState(false); 
          const [sessionAnswers, setSessionAnswers] = useState([]); 
          const [reviewMode, setReviewMode] = useState(false);
          const [reviewData, setReviewData] = useState([]); 
          
          const [history, setHistory] = useState(() => {
            try {
              const saved = localStorage.getItem('it_basic_local_history'); 
              const parsed = saved ? JSON.parse(saved) : [];
              return Array.isArray(parsed) ? parsed : [];
            } catch (e) { return []; }
          });

          useEffect(() => {
                if (isDarkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
          }, [isDarkMode]);

          // LỚP BẢO MẬT MÔN HỌC CHỐNG ĐĂNG NHẬP ĐỒNG THỜI + PHÂN QUYỀN ADMIN
          useEffect(() => {
            let sessionRef = null;
            const deviceToken = getOrCreateDeviceToken();

            const unsubscribe = auth.onAuthStateChanged((currentUser) => {
                if (currentUser) {
                    const ADMIN_EMAIL = "ngocyen@cucdang.com"; 
                    const userEmail = currentUser.email.toLowerCase();

                    // Nếu không phải là tài khoản Admin hệ thống thì bắt buộc phải chứa đuôi phân quyền của môn Tin học
                    if (userEmail !== ADMIN_EMAIL) {
                        if (!userEmail.includes(".tinhocdaura")) {
                            setAuthError("Tài khoản này không có quyền truy cập môn Tin học!");
                            auth.signOut();
                            setUser(null);
                            setLoading(false);
                            return;
                        }
                    }

                    const cleanUid = currentUser.uid;
                    sessionRef = db.ref(`active_sessions/mon_tin_hoc/${cleanUid}`);

                    if (!user) {
                        sessionRef.set({
                            deviceToken: deviceToken,
                            lastLogin: firebase.database.ServerValue.TIMESTAMP,
                            email: currentUser.email
                        });
                    }

                    sessionRef.on("value", (snapshot) => {
                        const data = snapshot.val();
                        if (data && data.deviceToken !== deviceToken) {
                            setIsKicked(true);
                            auth.signOut();
                            setUser(null);
                        }
                    });

                    setUser(currentUser);
                } else {
                    setUser(null);
                    if (sessionRef) sessionRef.off();
                }
                setLoading(false); 
            });
            return () => {
                unsubscribe();
                if (sessionRef) sessionRef.off();
            };
          }, [user]);

          const handleLogin = (e) => {
              e.preventDefault();
              setAuthError("");
              setIsKicked(false);
              if (!emailInput || !passwordInput) {
                  setAuthError("Vui lòng điền đầy đủ tài khoản và mật khẩu.");
                  return;
              }
              auth.signInWithEmailAndPassword(emailInput, passwordInput)
                .catch(err => {
                    if(err.code === "auth/user-not-found" || err.code === "auth/wrong-password" || err.code === "auth/invalid-credential") {
                        setAuthError("Tài khoản hoặc mật khẩu không chính xác.");
                    } else {
                        setAuthError("Lỗi máy chủ bảo mật: " + err.message);
                    }
                });
          };

          const handleGoHome = () => {
              if (window.confirm("Bạn có chắc muốn rời môn học và quay về trang chủ không?")) {
                  if (user) {
                      db.ref(`active_sessions/mon_tin_hoc/${user.uid}`).remove();
                  }
                  auth.signOut().then(() => {
                      window.location.href = "./index.html";
                  });
              }
          };

          const shuffleArray = (array) => {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
              const j = Math.floor(Math.random() * (i + 1));
              [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
          };

          const saveHistoryToLocal = (finalScore, finalWrong, totalQuestions, partId, answers) => {
            const newRecord = {
              id: Date.now(),
              date: new Date().toLocaleString('vi-VN'),
              part: partId,
              score: finalScore,
              wrong: finalWrong,
              total: totalQuestions,
              details: answers.map(q => ({
                id: q.id,
                q: q.q,
                o: q.options || [],
                s: q.userSelected, 
                c: q.correct
              }))
            };
            const updatedHistory = [newRecord, ...history];
            setHistory(updatedHistory);
            try {
              localStorage.setItem('it_basic_local_history', JSON.stringify(updatedHistory));
            } catch (e) {
              localStorage.setItem('it_basic_local_history', JSON.stringify(updatedHistory.slice(0, 30)));
            }
          };

          const clearHistory = () => {
            if (window.confirm('Bạn có chắc muốn xóa toàn bộ lịch sử kết quả không?')) {
              setHistory([]);
              localStorage.removeItem('it_basic_local_history');
            }
          };

          const startQuiz = (part) => {
            const raw = TEST_DATA[part] || [];
            const formatted = raw.map(item => ({
              id: item.id,
              q: item.q,
              correct: item.ans, 
              isMultiple: item.ans.length > 1, 
              options: shuffleArray([
                { key: 'a', text: item.a }, { key: 'b', text: item.b }, { key: 'c', text: item.c }, { key: 'd', text: item.d }
              ])
            }));
            setQuestions(formatted);
            setCurrentPart(part);
            setCurrentQuestionIndex(0);
            setScore(0);
            setWrongScore(0);
            setSessionAnswers([]);
            setShowResult(false);
            setSelectedOptions([]);
            setIsSubmitted(false);
            if(formatted.length > 0) setShuffledOptions(formatted[0].options);
          };

          const changeQuestion = (newIndex) => {
            setCurrentQuestionIndex(newIndex);
            const newQ = questions[newIndex];
            const existingAnswer = sessionAnswers.find(a => a.id === newQ.id);
            if (existingAnswer) {
              setShuffledOptions(existingAnswer.options);
              setSelectedOptions(existingAnswer.userSelected.split(''));
              setIsSubmitted(true);
            } else {
              setShuffledOptions(newQ.options);
              setSelectedOptions([]);
              setIsSubmitted(false);
            }
          };

          const handleOptionSelect = (optionKey, isMultiple) => {
            if (isSubmitted) return; 
            if (isMultiple) {
                if (selectedOptions.includes(optionKey)) {
                    setSelectedOptions(selectedOptions.filter(k => k !== optionKey));
                } else {
                    setSelectedOptions([...selectedOptions, optionKey]);
                }
            } else {
                setSelectedOptions([optionKey]);
            }
          };

          const checkAnswerSubmission = () => {
            if (selectedOptions.length === 0 || isSubmitted) return;
            const currentQ = questions[currentQuestionIndex];
            
            const userAnsStr = [...selectedOptions].sort().join('');
            const correctAnsStr = currentQ.correct.split('').sort().join('');
            const correct = userAnsStr === correctAnsStr;
            
            setIsSubmitted(true);
            if (correct) setScore(s => s + 1); else setWrongScore(s => s + 1);
            setSessionAnswers(prev => [...prev, { ...currentQ, userSelected: userAnsStr, options: shuffledOptions }]);
          };

          const nextQuestion = () => {
            if (currentQuestionIndex < questions.length - 1) changeQuestion(currentQuestionIndex + 1);
            else {
              setShowResult(true);
              saveHistoryToLocal(score, wrongScore, questions.length, currentPart, sessionAnswers);
            }
          };

          const prevQuestion = () => { if (currentQuestionIndex > 0) changeQuestion(currentQuestionIndex - 1); };

          const requestFinish = () => setIsConfirming(true);
          const confirmFinish = () => {
            setShowResult(true);
            saveHistoryToLocal(score, wrongScore, questions.length, currentPart, sessionAnswers);
            setIsConfirming(false);
          };
          const resetQuiz = () => { setCurrentPart(null); setQuestions([]); setReviewMode(false); };

          const currentQ = questions[currentQuestionIndex];

          const QuizPointHeader = () => (
            <header className="absolute top-4 inset-x-4 sm:top-6 sm:inset-x-8 z-50 flex items-center justify-between pointer-events-none">
                <div className="flex items-center gap-3 px-4 py-2 sm:px-5 sm:py-3 rounded-2xl border shadow-md glass-panel pointer-events-auto">
                    <div className="bg-gradient-to-br from-brand-500 to-emerald-600 text-white p-2 rounded-xl shadow-md transform hover:rotate-12 transition-transform">
                        <Target size={20} />
                    </div>
                    <div className="flex flex-col items-start">
                        <span className="text-sm font-black text-brand-700 dark:text-emerald-400 leading-none tracking-tight uppercase">QuizPoint</span>
                        <span className="text-[10px] font-bold text-slate-400 dark:text-slate-500 leading-tight uppercase tracking-widest">Studio</span>
                    </div>
                </div>

                <button 
                    onClick={() => setIsDarkMode(!isDarkMode)}
                    className="p-3 rounded-2xl border shadow-md glass-panel text-slate-700 dark:text-amber-400 hover:scale-105 transition-transform pointer-events-auto active:scale-95"
                    title="Thay đổi giao diện"
                >
                    {isDarkMode ? <Sun size={20} /> : <Moon size={20} />}
                </button>
            </header>
          );

          if (loading) {
            return (
              <div className="min-h-screen flex flex-col items-center justify-center">
                <div className="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-brand-500 mb-4"></div>
                <p className="text-slate-500 dark:text-slate-400 font-medium text-sm">Đang kiểm tra cổng kết nối bảo mật Cloud...</p>
              </div>
            )
          }

          if (!user) {
            return (
              <div className="min-h-screen p-6 flex flex-col items-center justify-center relative">
                <QuizPointHeader />
                <div className="w-full max-w-md p-8 sm:p-10 rounded-3xl shadow-2xl border bg-white dark:bg-slate-900 border-slate-100 dark:border-slate-800/80 animate-enter mt-14">
                    <div className="text-center mb-8">
                        <div className="inline-flex p-3 bg-brand-50 dark:bg-brand-950/50 text-brand-600 dark:text-emerald-400 rounded-2xl mb-3"><Lock size={32} /></div>
                        <h2 className="text-2xl font-black text-slate-800 dark:text-white tracking-tight uppercase">Đăng nhập môn học</h2>
                        <p className="text-xs text-slate-400 dark:text-slate-500 font-bold mt-1 uppercase tracking-wider">Trắc nghiệm Tin học đầu ra Phần 1</p>
                    </div>

                    {isKicked && (
                        <div className="mb-4 p-3 bg-rose-50 dark:bg-rose-950/40 border-l-4 border-rose-500 text-rose-700 dark:text-rose-400 text-xs font-semibold rounded-r-xl flex items-start gap-2 animate-enter">

                            <p>Tài khoản vừa bị khóa vì phát hiện đăng nhập cùng lúc từ một thiết bị khác!</p>

                    <form onSubmit={handleLogin} className="space-y-5">
                        <div>
                            <label className="block text-xs font-extrabold text-slate-400 mb-2 uppercase tracking-wider">Tài khoản Email</label>

                                <div className="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400 pointer-events-none"><Mail size={18} /></div>
                                <input type="email" placeholder="abc...@quizpointstudio.com" value={emailInput} onChange={e => setEmailInput(e.target.value)} className="w-full pl-11 pr-4 py-3.5 bg-slate-50 dark:bg-slate-800 text-slate-800 dark:text-white rounded-xl font-semibold border border-slate-200 dark:border-slate-700 focus:outline-none focus:ring-4 focus:ring-brand-500/20 focus:bg-white dark:focus:bg-slate-900 transition-all text-sm" required />
                            </div>
                        </div>
                        <div>
                            <label className="block text-xs font-extrabold text-slate-400 mb-2 uppercase tracking-wider">Mật mã bảo mật</label>
                            <div className="relative">
                                <div className="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400 pointer-events-none"><Lock size={18} /></div>
                                <input type="password" placeholder="••••••••" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} className="w-full pl-11 pr-4 py-3.5 bg-slate-50 dark:bg-slate-800 text-slate-800 dark:text-white rounded-xl font-semibold border border-slate-200 dark:border-slate-700 focus:outline-none focus:ring-4 focus:ring-brand-500/20 focus:bg-white dark:focus:bg-slate-900 transition-all text-sm" required />
                            </div>
                        </div>
                        {authError && <p className="text-xs font-bold text-rose-500 bg-rose-50 dark:bg-rose-950/30 p-3 rounded-lg border border-rose-100 dark:border-rose-900/40">{authError}</p>}
                        <button type="submit" className="w-full py-4 bg-gradient-to-r from-brand-500 to-emerald-600 text-white font-extrabold rounded-xl shadow-lg hover:shadow-xl transition-all text-sm uppercase tracking-wider">Xác nhận đăng nhập</button>
                    </form>
                    <div className="text-center mt-6">
                        <button onClick={() => window.location.href="./index.html"} className="text-xs text-slate-400 hover:text-brand-600 dark:hover:text-emerald-400 font-bold transition-all hover:underline">← Quay lại danh mục trang chủ</button>
                    </div>
                </div>
              </div>
            )
          }
          
          if (reviewMode) {
            return (
              <div className="min-h-screen p-4 sm:p-6 lg:p-8 bg-slate-50/50 dark:bg-slate-950/20">
                <div className="max-w-4xl mx-auto space-y-6">
                  <div className="glass-panel p-4 rounded-2xl shadow-sm sticky top-4 z-10 flex justify-between items-center mb-8">
                    <button onClick={() => setReviewMode(false)} className="flex items-center gap-2 text-brand-700 dark:text-emerald-400 hover:text-brand-900 font-extrabold transition-colors"><ArrowLeft size={20} /> <span>Quay lại</span></button>
                    <h2 className="text-xl font-black text-slate-800 dark:text-white tracking-tight uppercase">Chi tiết bài làm</h2>
                    <div className="w-8"></div> 
                  </div>
                  <div className="space-y-8 pb-10">
                    {reviewData.map((item, index) => {
                      const userAnsArr = item.s ? item.s.split('') : [];
                      const correctAnsArr = item.c ? item.c.split('') : [];
                      const isItemCorrect = item.s === item.c;
                      const options = Array.isArray(item.o) ? item.o : [];
                      return (
                        <div key={index} className={`bg-white dark:bg-slate-900 p-6 sm:p-8 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-800 ${!isItemCorrect ? 'ring-2 ring-red-500/20' : ''}`}>
                          <div className="flex gap-4 mb-2">
                            <span className={`flex-shrink-0 w-10 h-10 rounded-full flex items-center justify-center font-bold text-white shadow-lg ${isItemCorrect ? 'bg-gradient-to-br from-emerald-400 to-emerald-600' : 'bg-gradient-to-br from-red-400 to-red-600'}`}>{index + 1}</span>
                            <h3 className="text-lg font-bold text-slate-800 dark:text-slate-100 leading-relaxed">{item.q}</h3>
                          </div>
                          <div className="pl-14 mb-4 text-xs font-bold text-brand-600 dark:text-emerald-400">
                             {item.c.length > 1 ? "☑ Câu hỏi này tích chọn nhiều đáp án đúng" : "🔘 Câu hỏi này chọn một đáp án duy nhất"}
                          </div>
                          <div className="space-y-3 pl-0 sm:pl-14">
                            {options.map((opt, i) => {
                              const isOptCorrect = correctAnsArr.includes(opt.key);
                              const isOptSelected = userAnsArr.includes(opt.key);
                              let optionClass = "p-4 rounded-xl border flex justify-between items-center font-semibold text-sm ";
                              if (isOptCorrect) optionClass += "bg-emerald-50 dark:bg-emerald-950/30 border-emerald-200 dark:border-emerald-800 text-emerald-800 dark:text-emerald-300 shadow-sm";
                              else if (isOptSelected && !isOptCorrect) optionClass += "bg-red-50 dark:bg-red-950/30 border-red-200 dark:border-red-800 text-red-800 dark:text-red-300 shadow-sm";
                              else optionClass += "bg-white dark:bg-slate-900 border-slate-100 dark:border-slate-800 text-slate-400 dark:text-slate-600 opacity-70";
                              return (
                                <div key={i} className={optionClass}>
                                  <span>{opt.text}</span>
                                  {isOptCorrect && <CheckCircle size={20} className="text-emerald-600 dark:text-emerald-400" />}
                                  {isOptSelected && !isOptCorrect && <XCircle size={20} className="text-red-600 dark:text-red-400" />}
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            );
          }

          if (!currentPart) {
            const menuItems = [
                { id: 1, label: "Đề Số 01 (60 Câu)", sub: "Cấu trúc đề số 1", color: "emerald" },
                { id: 2, label: "Đề Số 02 (60 Câu)", sub: "Cấu trúc đề số 2", color: "teal" },
                { id: 3, label: "Đề Số 03 (60 Câu)", sub: "Cấu trúc đề số 3", color: "sky" },
                { id: 4, label: "Đề Số 04 (60 Câu)", sub: "Cấu trúc đề số 4", color: "blue" },
                { id: 5, label: "Đề Số 05 (60 Câu)", sub: "Cấu trúc đề số 5", color: "indigo" },
                { id: 6, label: "Đề Số 06 (60 Câu)", sub: "Cấu trúc đề số 6", color: "emerald" }
            ];
            return (
              <div className="min-h-screen flex flex-col relative w-full">
                <QuizPointHeader />
                
                {/* BANNER THƯƠNG HIỆU */}
                <div className="w-full bg-gradient-to-r from-slate-950 via-slate-900 to-teal-950 text-white shadow-xl relative overflow-hidden text-center pt-28 pb-16 md:pt-32 md:pb-20">
                    <div className="absolute inset-0 opacity-25 bg-[radial-gradient(circle_at_50%_50%,#10b981,transparent_60%)] animate-pulse-slow"></div>
                    <div className="absolute inset-0 bg-[linear-gradient(to_right,#ffffff05_1px,transparent_1px),linear-gradient(to_bottom,#ffffff05_1px,transparent_1px)] bg-[size:30px_30px]"></div>

                    <div className="absolute top-6 right-[25%] opacity-30 text-yellow-300 animate-bounce-slow"><Sparkles size={16} /></div>
                    <div className="absolute bottom-8 left-[20%] opacity-30 text-emerald-300 animate-float"><Sparkles size={22} /></div>

                    <div className="max-w-4xl mx-auto px-4 flex flex-col items-center justify-center gap-4 relative z-10">
                        <div className="p-3 bg-white/5 rounded-2xl backdrop-blur-md border border-white/10 animate-float inline-block shadow-xl">
                            <Monitor size={36} className="text-emerald-400" />
                        </div>
                        <div className="space-y-2">
                            <h1 className="pt-2 text-4xl md:text-5xl font-black tracking-tight uppercase bg-gradient-to-r from-white via-emerald-300 to-slate-200 bg-clip-text text-transparent drop-shadow-lg">
                                TIN HỌC ĐẦU RA PHẦN 1
                            </h1>
                            <p className="text-emerald-400 text-xs md:text-sm font-bold tracking-widest uppercase max-w-xl mx-auto leading-relaxed">
                                Ngân hàng 360 câu hỏi lý thuyết
                            </p>
                        </div>
                    </div>
                </div>

                {/* NÚT QUAY VỀ TRANG CHỦ */}
                <div className="absolute top-4 right-16 sm:top-6 sm:right-24 z-50 pointer-events-auto">
                    <button onClick={handleGoHome} className="flex items-center gap-2 px-4 py-2.5 bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 font-extrabold text-xs rounded-2xl border border-emerald-500/20 hover:bg-emerald-500/20 transition-all shadow-md">
                        <Home size={16}/> Quay về trang chủ
                    </button>
                </div>

                <div className="max-w-6xl mx-auto px-4 py-8 flex-1 w-full -mt-10 relative z-20 space-y-10">
                  
                  {/* HỌA TIẾT TRANG TRÍ */}
                  <div className="max-w-2xl mx-auto h-14 flex items-center justify-between px-8 rounded-2xl border shadow-sm glass-panel border-white/40 dark:border-slate-800/60 overflow-hidden relative group">
                        <div className="absolute inset-0 bg-gradient-to-r from-transparent via-brand-500/5 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000"></div>
                        <div className="flex items-center gap-2">
                            <span className="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981]"></span>
                            <span className="w-2 h-3 rounded-full bg-emerald-400/60 dark:bg-emerald-500/40"></span>
                            <span className="w-2 h-4 rounded-full bg-emerald-400/40 dark:bg-emerald-500/20"></span>
                            <div className="w-8 h-px bg-slate-300 dark:bg-slate-700 ml-2 hidden sm:block"></div>
                        </div>
                        <div className="flex items-center gap-3 text-slate-300 dark:text-slate-700">
                            <div className="w-1.5 h-1.5 rounded-full border border-slate-400 dark:border-slate-500 bg-white dark:bg-slate-900"></div>
                            <div className="w-12 h-px bg-gradient-to-r from-slate-300 to-brand-400 dark:from-slate-700 dark:to-brand-600"></div>
                            <Sparkles size={16} className="text-brand-500/80 dark:text-emerald-500/60" />
                            <div className="w-12 h-px bg-gradient-to-l from-slate-300 to-brand-400 dark:from-slate-700 dark:to-brand-600"></div>
                            <div className="w-1.5 h-1.5 rounded-full border border-slate-400 dark:border-slate-500 bg-white dark:bg-slate-900"></div>
                        </div>
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-px bg-slate-300 dark:bg-slate-700 mr-2 hidden sm:block"></div>
                            <span className="w-2 h-4 rounded-full bg-sky-400/40 dark:bg-sky-500/20"></span>
                            <span className="w-2 h-3 rounded-full bg-sky-400/60 dark:bg-sky-500/40"></span>
                            <span className="w-2 h-2 rounded-full bg-sky-500 shadow-[0_0_10px_#38bdf8]"></span>
                        </div>
                  </div>

                  {/* THÔNG TIN TÁC GIẢ */}
                  <div className="flex flex-col sm:flex-row items-center justify-center gap-4 sm:gap-8 text-slate-600 dark:text-slate-300 bg-white/70 dark:bg-slate-900/70 backdrop-blur-md py-3 px-6 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm max-w-xl mx-auto">
                        <div className="flex items-center gap-2 font-bold text-xs sm:text-sm">
                            <User size={16} className="text-brand-500" /> 
                            <span>Tên: <span className="text-brand-600 dark:text-emerald-400 font-extrabold">Nguyễn Văn Lượng</span></span>
                        </div>
                        <div className="w-px h-4 bg-slate-300 dark:bg-slate-700 hidden sm:block"></div>
                        <div className="flex items-center gap-2 font-bold text-xs sm:text-sm">
                            <Phone size={16} className="text-amber-500" /> 
                            <span>LH: <span className="font-mono text-slate-900 dark:text-white font-black">0333738861</span></span>

                  </div>

                  {/* BANNER QUẢNG CÁO TÍCH HỢP */}

                            <Sparkles size={100} />
                        </div>
                        <div className="relative z-10 flex flex-col items-center gap-4">

                                <Sparkles size={24} className="text-yellow-300 animate-pulse" />

                            <div className="flex flex-wrap justify-center gap-4 mt-1">

                                    <CheckCircle size={16} className="text-emerald-300" /> <span>Hệ thống Quiz</span>

                                 <div className="bg-white/20 backdrop-blur-md text-white border border-white/30 px-4 py-1.5 rounded-2xl flex items-center gap-2 shadow-sm text-xs font-semibold">

                  {/* GRID KHỐI ĐỀ THI */}

                  {/* LỊCH SỬ LÀM BÀI TRỰC TIẾP TẠI TRÌNH DUYỆT */}
                  <div className="glass-panel p-6 rounded-3xl shadow-sm max-w-2xl mx-auto w-full text-left">
                    <div className="flex justify-between items-center mb-6 px-2">
                      <h2 className="text-sm font-black text-slate-800 dark:text-slate-200 uppercase tracking-wider flex items-center gap-2"><History className="text-slate-400" size={18} /> Lịch sử kết quả làm bài</h2>
                      {history.length > 0 && <button onClick={clearHistory} className="text-rose-500 hover:text-rose-700 p-2 hover:bg-rose-50 rounded-lg transition-colors"><Trash2 size={18} /></button>}
                    </div>
                    {history.length === 0 ? <div className="text-center py-8 text-slate-400 dark:text-slate-600 border-2 border-dashed border-slate-200 dark:border-slate-800 rounded-xl text-xs font-bold italic">Chưa có lịch sử làm đề lưu trữ</div> : (
                      <div className="space-y-3 max-h-60 overflow-y-auto pr-2 custom-scrollbar">
                        {history.map((record) => (
                          <div key={record.id} className="p-4 bg-white dark:bg-slate-900 rounded-xl border border-slate-100 dark:border-slate-800/80 shadow-sm flex flex-col sm:flex-row justify-between items-center gap-4 hover:shadow-md transition-shadow">
                            <div className="flex-1 w-full sm:w-auto">
                              <div className="font-black text-sm text-slate-700 dark:text-slate-300 uppercase tracking-tight">Đề thi số {record.part}</div>
                              <div className="text-[11px] font-bold text-slate-400 dark:text-slate-500 mt-1 italic">{record.date}</div>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="text-right">
                                    <div className="text-sm font-black"><span className="text-emerald-600 dark:text-emerald-400">{record.score} Đ</span><span className="text-rose-500 ml-1.5">/ {record.wrong} S</span></div>
                                    <div className="text-[10px] font-extrabold text-slate-400 tracking-wide">/{record.total} CÂU</div>
                                </div>
                                <button onClick={() => { setReviewData(record.details || []); setReviewMode(true); }} className="p-2 bg-brand-50 dark:bg-slate-800 text-brand-600 dark:text-emerald-400 rounded-xl hover:bg-brand-100 dark:hover:bg-slate-700 transition-colors"><Eye size={18} /></button>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>

                </div>
              </div>
            );
          }

          if (showResult) {
            return (
              <div className="min-h-screen flex items-center justify-center p-4 text-center">
                <div className="bg-white dark:bg-slate-900 p-8 sm:p-10 rounded-3xl shadow-2xl max-w-md w-full border border-slate-100 dark:border-slate-800 animate-enter">
                  <div className="relative inline-block mb-6">
                    <div className="absolute inset-0 bg-yellow-400 blur-xl opacity-30 rounded-full"></div>
                    <Award className="w-20 h-20 text-yellow-500 relative z-10 animate-bounce-slow" />
                  </div>
                  <h2 className="text-2xl font-black text-slate-800 dark:text-white uppercase tracking-tight mb-2">Hoàn Thành Bài Thi!</h2>
                  <div className="grid grid-cols-2 gap-4 mb-8 mt-6">
                    <div className="p-4 bg-emerald-50 dark:bg-emerald-950/20 rounded-2xl border border-emerald-100 dark:border-emerald-900/50"><p className="text-emerald-600 dark:text-emerald-400 text-xs font-extrabold uppercase tracking-wider mb-1">Đúng</p><p className="text-4xl font-black text-emerald-600 dark:text-emerald-400">{score}</p></div>
                    <div className="p-4 bg-rose-50 dark:bg-rose-950/20 rounded-2xl border border-rose-100 dark:border-rose-900/50"><p className="text-rose-500 dark:text-rose-400 text-xs font-extrabold uppercase tracking-wider mb-1">Sai / Thiếu</p><p className="text-4xl font-black text-rose-500 dark:text-rose-400">{wrongScore}</p></div>
                  </div>
                  <button onClick={resetQuiz} className="w-full py-4 bg-gradient-to-r from-brand-500 to-emerald-600 text-white rounded-xl font-extrabold text-xs uppercase tracking-wider shadow-lg hover:shadow-xl transition-all flex items-center justify-center gap-2"><RotateCcw size={18} /> Về màn hình chính</button>
                </div>
              </div>
            );
          }

          const progress = ((currentQuestionIndex + 1) / questions.length) * 100;
          const currentQCorrectArr = currentQ.correct.split('');

          return (
            <div className="min-h-screen flex flex-col items-center p-4 sm:p-6 w-full max-w-3xl mx-auto relative justify-start">
              {isConfirming && (
                <div className="fixed inset-0 bg-slate-950/60 backdrop-blur-md z-50 flex items-center justify-center p-4 animate-enter">
                  <div className="bg-white dark:bg-slate-900 rounded-3xl p-6 sm:p-8 max-w-sm w-full shadow-2xl border border-slate-100 dark:border-slate-800">
                    <h3 className="text-lg font-black text-slate-800 dark:text-white uppercase tracking-tight mb-2">Nộp bài & kết thúc?</h3>
                    <p className="text-xs text-slate-400 dark:text-slate-500 font-medium mb-6">Kết quả đề thi hiện tại của bạn sẽ được lưu giữ lại hệ thống.</p>
                    <div className="flex gap-3">
                      <button onClick={() => setIsConfirming(false)} className="flex-1 py-3 px-4 bg-slate-50 dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-xl font-bold text-xs uppercase tracking-wider transition-colors">Tiếp tục thi</button>
                      <button onClick={confirmFinish} className="flex-1 py-3 px-4 bg-rose-500 text-white rounded-xl font-bold text-xs uppercase tracking-wider shadow-lg transition-colors">Nộp bài ngay</button>
                    </div>
                  </div>
                </div>
              )}
              
              <div className="w-full flex justify-between items-center mb-6 pt-2">
                <button onClick={requestFinish} className="p-2.5 rounded-xl text-slate-400 hover:text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-950/30 transition-all"><LogOut size={22} /></button>
                <div className="glass-panel px-4 py-2 rounded-full border text-xs font-bold text-slate-600 dark:text-slate-300 tracking-wide uppercase">Câu {currentQuestionIndex + 1} / {questions.length}</div>
                <div className="flex items-center gap-1 text-emerald-600 dark:text-emerald-400 font-extrabold text-xs bg-emerald-50 dark:bg-emerald-950/40 border border-emerald-100 dark:border-emerald-900/30 px-3 py-1.5 rounded-xl"><CheckCircle size={16} /> {score}</div>
              </div>
              
              <div className="w-full mb-8">
                <div className="h-2.5 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden shadow-inner"><div className="h-full bg-gradient-to-r from-emerald-400 to-teal-500 transition-all duration-300 ease-out rounded-full" style={{ width: `${progress}%` }} /></div>
              </div>
              
              <div className="w-full bg-white dark:bg-slate-900 p-6 sm:p-10 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-800/60 mb-24 relative overflow-hidden animate-enter">
                <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-brand-500 to-emerald-600"></div>
                <div className="mb-6">
                    <div className="flex flex-wrap items-center justify-between gap-2 mb-3">
                        <span className="inline-block bg-slate-50 dark:bg-slate-800 text-slate-400 dark:text-slate-500 text-[10px] font-extrabold px-2.5 py-1 rounded-md tracking-wider border border-slate-100 dark:border-slate-700/50">ID: #{currentQ.id}</span>
                        <span className={`text-[10px] font-black tracking-wider uppercase px-2.5 py-1 rounded-full ${currentQ.isMultiple ? 'bg-amber-50 dark:bg-amber-950/40 text-amber-600 border border-amber-200/50' : 'bg-teal-50 dark:bg-teal-950/40 text-teal-600 border border-teal-200/50'}`}>
                            {currentQ.isMultiple ? "☑ Tích chọn nhiều đáp án" : "🔘 Chọn một đáp án"}
                        </span>
                    </div>
                    <h2 className="text-xl sm:text-2xl font-black text-slate-800 dark:text-slate-100 leading-snug tracking-tight">{currentQ.q}</h2>
                </div>
                
                <div className="space-y-3.5">
                  {shuffledOptions.map((option, idx) => {
                    const isSelected = selectedOptions.includes(option.key);
                    const isOptCorrect = currentQCorrectArr.includes(option.key);
                    
                    let containerClass = "w-full p-5 rounded-2xl border text-left font-semibold transition-all duration-200 flex justify-between items-center relative overflow-hidden text-sm ";
                    
                    if (isSubmitted) {
                      if (isOptCorrect) containerClass += "border-emerald-500 bg-emerald-50 dark:bg-emerald-950/30 text-emerald-800 dark:text-emerald-300 ring-2 ring-emerald-200/50";
                      else if (isSelected && !isOptCorrect) containerClass += "border-rose-500 bg-rose-50 dark:bg-rose-950/30 text-rose-800 dark:text-rose-300 ring-2 ring-rose-200/50";
                      else containerClass += "border-slate-100 dark:border-slate-800 text-slate-400 dark:text-slate-600 opacity-50";
                    } else {
                      if (isSelected) containerClass += "border-teal-500 bg-teal-50/60 dark:bg-slate-800/80 text-teal-900 dark:text-teal-300 ring-2 ring-teal-200/50 shadow-sm";
                      else containerClass += "border-slate-100 dark:border-slate-800 hover:border-brand-400 dark:hover:border-emerald-500 hover:bg-brand-50/30 dark:hover:bg-slate-800/50 cursor-pointer active:scale-[0.995] text-slate-600 dark:text-slate-300";
                    }
                    
                    return (
                      <button key={idx} onClick={() => handleOptionSelect(option.key, currentQ.isMultiple)} disabled={isSubmitted} className={containerClass}>
                        <div className="flex items-center gap-4 relative z-10">
                            <div className={`w-5 h-5 flex items-center justify-center border-2 flex-shrink-0 transition-colors rounded-md ${isSelected ? 'border-brand-500 bg-brand-500 text-white' : 'border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900'}`}>
                                {isSelected && (
                                    <svg className="w-3 h-3 fill-current" viewBox="0 0 20 20">
                                        <path d="M0 11l2-2 5 5L18 3l2 2L7 18z"/>
                                    </svg>
                                )}
                            </div>
                            <span>{option.text}</span>
                        </div>
                        {isSubmitted && isOptCorrect && <CheckCircle className="text-emerald-600 dark:text-emerald-400 flex-shrink-0 ml-4" size={22} />}
                        {isSubmitted && isSelected && !isOptCorrect && <XCircle className="text-rose-600 dark:text-rose-400 flex-shrink-0 ml-4" size={22} />}
                      </button>
                    );
                  })}
                </div>
                
                {!isSubmitted && selectedOptions.length > 0 && (
                    <div className="mt-6 flex justify-end">
                        <button onClick={checkAnswerSubmission} className="px-6 py-3 bg-gradient-to-r from-brand-500 to-emerald-600 text-white font-extrabold rounded-xl shadow-md hover:shadow-lg transition-all text-xs uppercase tracking-wider">
                            Xác nhận đáp án
                        </button>
                    </div>
                )}
              </div>
              
              <div className="fixed bottom-0 left-0 right-0 p-4 bg-white/80 dark:bg-slate-950/80 backdrop-blur-md border-t border-slate-100 dark:border-slate-900/60 flex justify-center items-center gap-4 z-20">
                <button onClick={prevQuestion} disabled={currentQuestionIndex === 0} className={`w-14 h-14 rounded-2xl flex items-center justify-center border transition-all ${currentQuestionIndex === 0 ? 'bg-slate-50 dark:bg-slate-900 border-slate-100 dark:border-slate-800 text-slate-300 dark:text-slate-700' : 'bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-400 hover:border-slate-400'}`}><ChevronLeft size={24} /></button>
                <button onClick={nextQuestion} disabled={!isSubmitted} className={`flex-1 max-w-md h-14 rounded-2xl font-black text-xs uppercase tracking-wider shadow-lg flex items-center justify-center gap-2 transition-all transform active:scale-95 ${!isSubmitted ? 'bg-slate-100 dark:bg-slate-900 text-slate-400 dark:text-slate-600 shadow-none' : 'bg-brand-600 text-white shadow-emerald-500/20'}`}>
                    {currentQuestionIndex === questions.length - 1 ? "Xem kết quả" : "Câu tiếp theo"} <ChevronRight size={20} />
                </button>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<QuizApp />);
    </script>
</body>
</html>
