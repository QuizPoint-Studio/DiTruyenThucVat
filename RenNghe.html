        // ============================================================================

        const FULL_DATA = [
          [1, "Giá thể dùng để giâm cành ngải cứu hoang dại bao gồm các thành phần nào?", "Cát và phân chuồng.", "Sơ dừa và đất.", "Mùn cưa và tro trấu.", "Đất sét và đá trân châu.", "b", "Sơ dừa và đất giúp tạo độ tơi xốp, thoát nước tốt và giữ ẩm lý tưởng cho cành giâm."],
          [2, "Trong phương pháp giâm cành, cành cần được cắt một góc như thế nào?", "Cắt ngang góc 90°.", "Cắt chéo một góc lớn hơn 50°.", "Cắt chéo một góc nhỏ hơn 50°.", "Cắt chéo một góc chính xác 60°.", "c", "Cắt chéo một góc nhỏ hơn $50^\\circ$ giúp tăng tối đa diện tích tiếp xúc của mặt cắt với giá thể, từ đó cành dễ hút nước và nhanh ra rễ hơn."],
          [3, "Độ dài lý tưởng của một đoạn cành giâm là bao nhiêu?", "1 - 2 cm.", "3 - 4 cm.", "5 - 7 cm.", "10 - 15 cm.", "c", "Độ dài 5-7cm là kích thước tối ưu để cành có đủ năng lượng dự trữ mà không bị mất nước quá nhanh."],
          [4, "Sau khi cắt đoạn giâm cành, bước xử lý lá tiếp theo là gì?", "Để nguyên toàn bộ lá.", "Chỉ cắt tỉa các lá già.", "Bỏ hết toàn bộ lá trên đoạn giâm.", "Chỉ để lại 1/2 số lá.", "d", "Chỉ để lại khoảng 1/2 số lá nhằm giảm bớt sự thoát hơi nước của cành trong giai đoạn chưa có rễ hút nước."],
          [5, "Yêu cầu quan trọng về bộ phận có trên đoạn cắt giâm cành là gì?", "Cần có rễ sẵn.", "Cần có lá to, xanh đậm.", "Cần có mầm non hoặc chồi non.", "Cần có hoa hoặc nụ.", "c", "Cành giâm bắt buộc phải có mầm non hoặc chồi nách để sau khi ra rễ, cây có thể phát triển tán lá mới."],
          [6, "Để trộn 1 tấn phân hỗn hợp tỉ lệ 8-4-12, cần bao nhiêu kg Amonium sunfat (21-0-0)?", "250 kg.", "381 kg.", "425 kg.", "200 kg.", "b", "Cách tính: $(1000 \\times 8) / 21 \\approx 381 \\text{ kg}$."],
          [7, "Để trộn 1 tấn phân hỗn hợp tỉ lệ 8-4-12, cần bao nhiêu kg Super lân đơn (16% $P_2O_5$)?", "150 kg.", "200 kg.", "250 kg.", "300 kg.", "c", "Cách tính: $(1000 \\times 4) / 16 = 250 \\text{ kg}$."],
          [8, "Để trộn 1 tấn phân hỗn hợp tỉ lệ 8-4-12, cần bao nhiêu kg Kali clorua (60% $K_2O$)?", "100 kg.", "150 kg.", "200 kg.", "250 kg.", "c", "Cách tính: $(1000 \\times 12) / 60 = 200 \\text{ kg}$."],
          [9, "Loại phân nào thường được ưu tiên dùng để bón lót?", "Phân Đạm (Ure).", "Phân Lân.", "Phân Kali.", "Phân NPK hỗn hợp.", "b", "Phân Lân thường ít tan, cần thời gian lâu để phân hủy nên ưu tiên bón lót."],
          [10, "Đối với loại cây trồng lấy lá, việc sử dụng phân Kali nên như thế nào?", "Bón thật nhiều để lá xanh.", "Bón ít lại.", "Không bón hoàn toàn.", "Bón thay thế hoàn toàn cho đạm.", "b", "Cây lấy lá cần nhiều Đạm hơn để phát triển sinh khối xanh."],
          [11, "Loại cây nào sau đây cần được bón thêm nhiều phân Kali?", "Cây lấy lá.", "Cây lấy gỗ.", "Cây lấy củ.", "Cây rau mầm.", "c", "Kali giúp thúc đẩy vận chuyển dinh dưỡng về cơ quan dự trữ (củ)."],
          [12, "Phân chuồng được xếp vào nhóm phân nào?", "Phân vô cơ.", "Phân hóa học.", "Phân hữu cơ.", "Phân vi lượng.", "c", "Phân chuồng có nguồn gốc từ chất thải động vật."],
          [13, "Nguyên tắc cơ bản khi bón phân vô cơ (phân hóa học) là gì?", "Bón càng nhiều càng tốt.", "Bón khi cây chuẩn bị thu hoạch.", "Bón vừa đủ, vừa phải.", "Chỉ bón khi cây bị sâu bệnh.", "c", "Bón đúng liều lượng giúp tránh ngộ độc cây và ô nhiễm đất."],
          [14, "Trong 300kg phân Super lân (16% $P_2O_5$) có chứa bao nhiêu kg $P_2O_5$ nguyên chất?", "16 kg.", "32 kg.", "48 kg.", "60 kg.", "c", "Cách tính: $300 \\times 16\\% = 48 \\text{ kg}$."],
          [15, "Công thức nào sau đây dùng để tính lượng thuốc dạng bột (kg) cần thiết?", "Lượng thuốc (kg) = (Liều lượng * Diện tích * Tỉ lệ hoạt chất) / 100.", "Lượng thuốc (kg) = (Liều lượng cần thiết của thuốc kg ai/ha * Diện tích cần được xủ lý* 100) / Tỉ lệ hoạt chất.", "Lượng thuốc (kg) = (Tỉ lệ hoạt chất * 100) / (Liều lượng * Diện tích).", "Lượng thuốc (kg) = Liều lượng / (Diện tích * 100).", "b", "Công thức chuẩn để tính lượng thuốc thương phẩm cần dùng."],
          [16, "Công thức đúng để tính lượng thuốc dạng lỏng (Lít) là:", "Lượng thuốc (L) = (Nồng độ % * Thể tích cần phun(L/ha) * Diện tích cần được xử lý * 100) / Tỉ lệ hoạt chất.", "Lượng thuốc (L) = (Nồng độ % * Thể tích phun * 100) / (Diện tích * Tỉ lệ hoạt chất).", "Lượng thuốc (L) = (Tỉ lệ hoạt chất * Thể tích phun * 100) / Nồng độ %.", "Lượng thuốc (L) = Nồng độ % * Thể tích phun * Diện tích.", "a", "Công thức tính cho thuốc dạng lỏng dựa trên nồng độ pha loãng."],
          [17, "Cần bao nhiêu kg thuốc bột xử lý $250m^2$, liều lượng 1kg ai/ha, tỉ lệ hoạt chất 5%? ($1 ha = 10.000m^2$)", "0.25 kg.", "0.5 kg.", "1.0 kg.", "2.5 kg.", "b", "Cách tính: Diện tích 250 $m^2$ = 0.025 ha. Lượng thuốc bột = $(0.025 \\times 100) / 5 = 0.5 \\text{ kg}$."],
          [18, "Cần bao nhiêu lít thuốc xử lý 0,5 ha, nồng độ 0,04%, thể tích phun 320L/ha, tỉ lệ hoạt chất 45%?", "10.22 L.", "12.55 L.", "14.22 L.", "16.88 L.", "c", "Cách tính: Lượng thuốc (L) = $(0.04 \\times 320 \\times 0,5 \\times 100) / 45 \\approx 14.22 \\text{ L}$."],
          [19, "Khi cây bị héo do nấm, nếu ngắt cây đem nhúng vào nước thì hiện tượng gì xảy ra?", "Cây tiết ra dịch mùi hôi.", "Cây bị thối nhũn ngay lập tức.", "Cây khô bình thường.", "Cây nhanh chóng xanh lại.", "c", "Nấm gây tắc mạch dẫn; khi nhúng nước cây không tiết dịch mùi hôi như vi khuẩn."],
          [20, "Đặc điểm nhận diện cây bị héo do vi khuẩn là gì?", "Sáng xanh, chiều héo; dịch chảy có mùi hôi khi nhúng nước.", "Lá xuất hiện các đốm đen nhỏ.", "Cây héo khô từ từ từ ngọn xuống gốc.", "Lá bị biến dạng và đổi màu vàng nhạt.", "a", "Dấu hiệu điển hình của héo xanh do vi khuẩn."],
          [21, "Loại tác nhân gây bệnh nào sau đây KHÔNG thể chữa trị được?", "Nấm.", "Vi khuẩn.", "Vi rút.", "Tuyến trùng.", "c", "Vi rút hiện chưa có thuốc đặc trị, chủ yếu phòng ngừa."],
          [22, "Để quy trình trồng cây thành công, cần lưu ý những yếu tố nào sau đây?", "Thời tiết, phân bón, thuốc trừ sâu, lao động.", "Thị trường, chất lượng, số lượng, đối tượng kiểm dịch.", "Giá giống, phân bón, hệ thống tưới, vận chuyển.", "Giống cây, đất đai, nguồn nước, kỹ thuật canh tác.", "d", "Bốn yếu tố kỹ thuật cốt lõi trong canh tác."],
          [23, "Đặc điểm vết đục của Ruồi đục lá là gì?", "Vết đục hình vòng tròn đồng tâm.", "Vết đục ở chóp hoặc dọc mép; chồng chéo và cắt nhau.", "Vết đục thẳng tắp từ cuống đến ngọn lá.", "Vết đục nằm sâu trong gân chính của lá.", "b", "Đường đục ngoằn ngoèo, thường ở mép lá và chồng chéo lên nhau."],
          [24, "Sâu vẽ bùa gây hại chủ yếu trên nhóm cây trồng nào?", "Cây họ đậu.", "Cây lúa và hoa màu.", "Các cây họ cam quýt.", "Cây lấy củ.", "c", "Đối tượng gây hại nguy hiểm trên cam, quýt, bưởi."],
          [25, "Điểm khác biệt rõ nhất giữa vết đục của sâu vẽ bùa và ruồi đục lá là gì?", "Sâu vẽ bùa đục vết to hơn.", "Đường đục của sâu vẽ bùa không cắt nhau (không đi lại).", "Sâu vẽ bùa chỉ ăn phần gân lá.", "Ruồi đục lá tạo ra các đường vẽ nguệch ngoạc hơn.", "b", "Sâu vẽ bùa đục đường dài liên tục và không bao giờ bò cắt ngang vết cũ."],

        const QuizApp = () => {
          const [currentPart, setCurrentPart] = useState(null);
          const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
          const [score, setScore] = useState(0);

              [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
          };

              id: Date.now(),
              date: new Date().toLocaleString('vi-VN'),
              part: partId,
              score: finalScore,
              wrong: finalWrong,
              total: totalQuestions,
              details: answers.map(q => ({
                id: q.id,
                q: q.q,
                o: q.options || [],
                s: q.userSelected,
                c: q.correct,
                explanation: q.explanation
              }))
            };
            const updatedHistory = [newRecord, ...history];
            setHistory(updatedHistory);
            try {
              localStorage.setItem('ren_nghe_quiz_v1', JSON.stringify(updatedHistory));
            } catch (e) {
              localStorage.setItem('ren_nghe_quiz_v1', JSON.stringify(updatedHistory.slice(0, 30)));

          };

          const clearHistory = () => {
            if (window.confirm('Bạn có chắc muốn xóa toàn bộ lịch sử không?')) {

              localStorage.removeItem('ren_nghe_quiz_v1');
            }

            let filtered;
            if (part === 1) filtered = FULL_DATA.slice(0, 5);
            else if (part === 2) filtered = FULL_DATA.slice(5, 14);
            else if (part === 3) filtered = FULL_DATA.slice(14, 18);
            else if (part === 4) filtered = FULL_DATA.slice(18, 25);
            else if (part === 5) filtered = FULL_DATA.slice(25, 29);
            else if (part === 6) filtered = FULL_DATA.slice(29, 41);
            else filtered = FULL_DATA;

            const formatted = filtered.map(item => ({
              id: item[0],
              q: item[1],
              correct: item[6],
              explanation: item[7] || "", 
              options: shuffleArray([
                { key: 'a', text: item[2] }, { key: 'b', text: item[3] }, { key: 'c', text: item[4] }, { key: 'd', text: item[5] }
              ])

            setCurrentPart(part);
            setCurrentQuestionIndex(0);
            setScore(0);
            setWrongScore(0);
            setSessionAnswers([]);
            setShowResult(false);
            setSelectedOption(null);
            setIsCorrect(null);
            if(formatted.length > 0) setShuffledOptions(formatted[0].options);
          };

            setCurrentQuestionIndex(newIndex);
            const newQ = questions[newIndex];
            const existingAnswer = sessionAnswers.find(a => a.id === newQ.id);
            if (existingAnswer) {
              setShuffledOptions(existingAnswer.options);
              setSelectedOption(existingAnswer.userSelected);
              setIsCorrect(existingAnswer.userSelected === existingAnswer.correct);
            } else {
              setShuffledOptions(newQ.options);
              setSelectedOption(null);
              setIsCorrect(null);
            }
          };

            if (selectedOption) return; 
            const currentQ = questions[currentQuestionIndex];
            const correct = optionKey === currentQ.correct;
            setSelectedOption(optionKey);
            setIsCorrect(correct);
            if (correct) setScore(s => s + 1); else setWrongScore(s => s + 1);
            setSessionAnswers(prev => [...prev, { ...currentQ, userSelected: optionKey, options: shuffledOptions }]);
          };

            else {
              setShowResult(true);
              saveHistory(score, wrongScore, questions.length, currentPart, sessionAnswers);
            }
          };

          const prevQuestion = () => { if (currentQuestionIndex > 0) changeQuestion(currentQuestionIndex - 1); };

          const requestFinish = () => setIsConfirming(true);
          const confirmFinish = () => {
            setShowResult(true);
            saveHistory(score, wrongScore, questions.length, currentPart, sessionAnswers);

                                </div>

                            })}
                          </div>

                            <div className="mt-6 p-4 bg-brand-50 border border-brand-100 rounded-2xl flex gap-3 ml-0 sm:ml-14 animate-enter">
                                <Info className="text-brand-600 flex-shrink-0" size={20} />
                                <div className="text-sm text-brand-800 leading-relaxed">
                                    <span className="font-bold">Hướng dẫn:</span> {item.explanation}
                                </div>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            );

          if (!currentPart) {
            const menuItems = [
                { id: 1, label: "Giâm cành", sub: "Phần 1", color: "emerald", icon: <Scissors size={28} /> },

                                 <div className="bg-white/20 backdrop-blur-md text-white border border-white/30 px-4 py-2 rounded-2xl flex items-center gap-2 shadow-sm">
                                    <CheckCircle size={18} className="text-emerald-300" /> 
                                    <span className="font-medium text-sm">Hệ thống Quiz</span>

                                 <div className="bg-white/20 backdrop-blur-md text-white border border-white/30 px-4 py-2 rounded-2xl flex items-center gap-2 shadow-sm">
                                    <Presentation size={18} className="text-sky-300" /> 
                                    <span className="font-medium text-sm">Thiết kế PPT</span>

                            </div>

                            sky: "text-sky-600 border-sky-100/80 hover:border-sky-400 hover:bg-sky-50/30", 
                            blue: "text-blue-600 border-blue-100/80 hover:border-blue-400 hover:bg-blue-50/30", 
                            indigo: "text-indigo-600 border-indigo-100/80 hover:border-indigo-400 hover:bg-indigo-50/30" 
                        };
                        return (
                            <button key={item.id} onClick={() => startQuiz(item.id)} className={`relative group p-6 rounded-2xl border-2 transition-all duration-300 hover:-translate-y-1.5 hover:shadow-xl flex flex-col items-center justify-center gap-3 text-center bg-white/80 backdrop-blur-sm shadow-sm ${colorMap[item.color]}`}>
                              <div className="p-3 rounded-xl bg-white shadow-sm group-hover:scale-110 transition-transform duration-300 ring-1 ring-gray-100 text-brand-500">{item.icon}</div>
                              <div><div className="font-bold text-lg text-gray-800">{item.label}</div><div className="text-xs font-medium opacity-70 mt-1">{item.sub}</div></div>

                        )
                    })}

                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              </div>
            );
          }

                  <h2 className="text-3xl font-bold mb-2 text-gray-800 tracking-tight">Hoàn Thành!</h2>
                  <div className="grid grid-cols-2 gap-4 mb-8 mt-6">
                    <div className="p-4 bg-emerald-50 rounded-2xl border border-emerald-100"><p className="text-emerald-600 text-xs font-bold uppercase tracking-wider mb-1">Đúng</p><p className="text-4xl font-bold text-emerald-600">{score}</p></div>
                    <div className="p-4 bg-rose-50 rounded-2xl border border-rose-100"><p className="text-rose-500 text-xs font-bold uppercase tracking-wider mb-1">Sai</p><p className="text-4xl font-bold text-rose-500">{wrongScore}</p></div>
                  </div>
                  <button onClick={resetQuiz} className="w-full py-4 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl font-bold shadow-lg shadow-emerald-200 transition-all flex items-center justify-center gap-2"><RotateCcw size={20} /> Về màn hình chính</button>
                </div>
              </div>
            );
          }

          const progress = ((currentQuestionIndex + 1) / questions.length) * 100;
          return (
            <div className="min-h-screen flex flex-col items-center p-4 sm:p-6 font-sans relative">
              {isConfirming && (
                <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-enter">
                  <div className="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl">
                    <h3 className="text-xl font-bold text-gray-800 mb-2">Kết thúc bài?</h3>
                    <p className="text-gray-500 mb-8">Kết quả hiện tại sẽ được lưu lại.</p>
                    <div className="flex gap-3">
                      <button onClick={() => setIsConfirming(false)} className="flex-1 py-3 px-4 bg-gray-100 text-gray-700 rounded-xl font-bold transition-colors">Tiếp tục</button>
                      <button onClick={confirmFinish} className="flex-1 py-3 px-4 bg-rose-500 text-white rounded-xl font-bold shadow-lg transition-colors">Kết thúc</button>
                    </div>
                  </div>
                </div>
              )}
              <div className="w-full max-w-3xl flex justify-between items-center mb-6 pt-2">
                <button onClick={requestFinish} className="p-2 rounded-xl text-gray-400 hover:text-rose-500 hover:bg-rose-50 transition-all ml-0"><LogOut size={24} /></button>
                <div className="glass-panel px-4 py-2 rounded-full border border-white/60 shadow-sm text-xs sm:text-sm font-semibold text-gray-600 tracking-tight">Câu {currentQuestionIndex + 1} / {questions.length}</div>
                <div className="flex items-center gap-3"><div className="flex items-center gap-1 text-emerald-600 font-bold bg-emerald-50 px-3 py-1 rounded-lg"><CheckCircle size={16} /> {score}</div></div>
              </div>
              <div className="w-full max-w-3xl mb-8">
                <div className="h-3 bg-gray-200 rounded-full overflow-hidden shadow-inner"><div className="h-full bg-gradient-to-r from-emerald-400 to-teal-500 transition-all duration-500 ease-out rounded-full" style={{ width: `${progress}%` }} /></div>
              </div>
              <div className="w-full max-w-3xl bg-white p-6 sm:p-10 rounded-3xl shadow-xl border border-gray-100 mb-8 relative overflow-hidden animate-enter">
                <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-emerald-400 to-teal-500"></div>
                <div className="mb-8"><span className="inline-block bg-gray-100 text-gray-500 text-[10px] font-bold px-2 py-1 rounded mb-3 tracking-wide">ID: {currentQ.id}</span><h2 className="text-xl sm:text-2xl font-bold text-gray-800 leading-normal">{currentQ.q}</h2></div>
                <div className="space-y-3">
                  {shuffledOptions.map((option, idx) => {
                    let containerClass = "w-full p-5 rounded-2xl border-2 text-left transition-all duration-200 flex justify-between items-center relative overflow-hidden ";
                    if (selectedOption) {
                      if (option.key === currentQ.correct) containerClass += "border-emerald-500 bg-emerald-50 text-emerald-800 ring-2 ring-emerald-200";
                      else if (option.key === selectedOption) containerClass += "border-rose-500 bg-rose-50 text-rose-800 ring-2 ring-rose-200";
                      else containerClass += "border-gray-100 text-gray-400 opacity-60";
                    } else containerClass += "border-gray-100 hover:border-emerald-300 hover:bg-emerald-50/50 cursor-pointer active:scale-[0.99] text-gray-600";
                    return (
                      <button key={idx} onClick={() => handleOptionSelect(option.key)} disabled={!!selectedOption} className={containerClass}>
                        <span className="relative z-10 font-medium text-lg">{option.text}</span>
                        {selectedOption && option.key === currentQ.correct && <CheckCircle className="text-emerald-600 relative z-10" size={24} />}
                        {selectedOption && option.key === selectedOption && option.key !== currentQ.correct && <XCircle className="text-rose-600 relative z-10" size={24} />}
                      </button>
                    );
                  })}
                </div>
              </div>

              {selectedOption && currentQ.explanation && (
                <div className="w-full max-w-3xl glass-panel p-5 sm:p-6 rounded-3xl border border-brand-100 shadow-sm mb-24 animate-enter flex gap-4">
                    <div className="bg-brand-500 text-white w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 shadow-lg shadow-brand-100">
                        <Info size={24} />
                    </div>
                    <div>
                        <h4 className="font-bold text-brand-700 text-sm uppercase tracking-wider mb-1">Hướng dẫn giải chi tiết</h4>
                        <p className="text-gray-700 leading-relaxed">{currentQ.explanation}</p>
                    </div>
                </div>
              )}

              <div className="fixed bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-md border-t border-gray-200 flex justify-center items-center gap-4 z-20">
                <button onClick={prevQuestion} disabled={currentQuestionIndex === 0} className={`w-14 h-14 rounded-2xl flex items-center justify-center transition-all ${currentQuestionIndex === 0 ? 'bg-gray-100 text-gray-300' : 'bg-white border-2 border-gray-200 text-gray-600 hover:border-gray-400'}`}><ChevronLeft size={24} /></button>
                <button onClick={nextQuestion} disabled={!selectedOption && !sessionAnswers.some(a => a.id === currentQ.id)} className={`flex-1 max-w-md h-14 rounded-2xl font-bold text-lg shadow-lg flex items-center justify-center gap-2 transition-all transform active:scale-95 ${(!selectedOption && !sessionAnswers.some(a => a.id === currentQ.id)) ? 'bg-gray-100 text-gray-400' : isCorrect ? 'bg-emerald-600 text-white shadow-emerald-200' : 'bg-gray-800 text-white shadow-gray-300'}`}>{currentQuestionIndex === questions.length - 1 ? "Xem kết quả" : "Câu tiếp theo"} <ChevronRight size={24} /></button>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<QuizApp />);
    </script>
</body>
</html>
